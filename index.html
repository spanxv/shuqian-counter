<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>数钱计算器 · SPAN</title>
    <!-- 引入 html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4fafd;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        .calculator {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 16px;               /* 从48px 调小 */
            box-shadow: 0 20px 40px rgba(0, 80, 150, 0.12);
            padding: 28px 10px 36px;            /* 左右内边距改为10px，避免边框压缩内容 */
            border: 1px solid rgba(0, 140, 255, 0.15);
            position: relative;
            z-index: 1;
        }

        /* 头部 */
        .header-row {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 8px;
            position: relative;
            z-index: 20;
            background: white;
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #065a8f;
            margin: 0;
            padding-left: 12px;
            border-left: 6px solid #3f9eff;
            line-height: 1.2;
            white-space: nowrap;
            flex-shrink: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60%;
        }

        .action-group {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }

        /* 汉堡菜单容器 */
        .hamburger-container {
            position: relative;
            display: none;
            flex-shrink: 0;
        }

        .hamburger-btn {
            background: white;
            border: 1.8px solid #3399ff;
            color: #1f6eb0;
            font-size: 2.2rem;
            font-weight: 400;
            line-height: 1;
            padding: 0 16px;
            border-radius: 20px;                /* 从40px调小 */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 110, 220, 0.06);
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 52px;
            background: #f8fcff;
            letter-spacing: 0.2px;
        }

        .hamburger-btn:active {
            background: #e2f0ff;
            transform: scale(0.96);
            border-color: #1a73d9;
        }

        /* 按钮通用样式 */
        .action-btn {
            background: white;
            border: 1.8px solid #3399ff;
            color: #1f6eb0;
            font-size: 1.05rem;
            font-weight: 520;
            padding: 10px 22px;
            border-radius: 20px;                /* 调小 */
            box-shadow: 0 4px 10px rgba(0, 110, 220, 0.06);
            cursor: pointer;
            transition: transform 0.1s ease;
            background: #f8fcff;
            letter-spacing: 0.2px;
            will-change: transform;
            white-space: nowrap;
        }

        .action-btn:active {
            background: #e2f0ff;
            transform: scale(0.96);
            border-color: #1a73d9;
        }

        /* 初始化按钮红色边框 */
        #resetAllBtn {
            border-color: #ff3b3b !important;
            border-width: 2px !important;
            background: #fff4f4;
            color: #b91c1c;
        }

        /* 总金额区域 */
        .total-banner-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            margin: 10px 0 32px 0;
            width: 100%;
            border-radius: 16px;                 /* 统一 */
            background: transparent;
        }

        .total-banner {
            background: linear-gradient(105deg, #355FE1 0%, #273FAB 100%);
            border-radius: 16px;                 /* 从100px调小 */
            padding: 16px 28px 18px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 18px rgba(0, 120, 230, 0.2);
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
        }

        .total-banner:active {
            transform: scale(0.98);
        }

        .total-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #f0f8ff;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .total-amount {
            font-size: 2.8rem;          
            font-weight: 600;
            color: white;
            line-height: 1.2;
            letter-spacing: 0.5px;
            white-space: nowrap;         
            overflow: hidden;            
            text-overflow: clip;          
            text-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: font-size 0.1s ease;
        }

        .total-amount .currency-symbol {
            font-size: 0.7em;            
            margin-right: 4px;
            font-weight: 500;
        }

        /* 复制提示 */
        .copy-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a4b7a;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;            /* 稍小 */
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0, 60, 120, 0.3);
            z-index: 2000;
            border: 2px solid rgba(255,255,255,0.3);
            animation: fadeInOut 1.5s ease forwards;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        /* 双栏布局 */
        .main-content {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        /* ===== 固定面值区域 & 其他项目区域 添加边框 + 内边距10px ===== */
        .fixed-section {
            flex: 1 1 400px;
            min-width: 300px;
            border: 1px solid #c0d0e6;        /* 浅灰蓝边框 */
            border-radius: 12px;               /* 圆角调小 */
            padding: 10px;                      /* 内边距10px */
            background: rgba(255,255,255,0.4);
        }

        .other-section {
            flex: 1 1 350px;
            min-width: 280px;
            border: 1px solid #c0d0e6;
            border-radius: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.4);
        }

        .fixed-header, .other-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;               /* 稍减 */
            flex-wrap: nowrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            overflow: hidden;
        }

        .fixed-header h2, .other-header h2 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #065a8f;
            margin: 0;
            white-space: nowrap;
        }

        .region-total {
            font-size: 1.5rem;
            font-weight: 550;
            color: #1f6eb0;
            background: #e3f0ff;
            padding: 4px 16px;
            border-radius: 12px;                /* 从60px调小 */
            line-height: 1.2;
            white-space: nowrap;
            border: 1px solid #99ccff;
            flex-shrink: 0;
        }

        /* 统一的区域按钮样式 */
        .section-btn {
            background: #355FE1;
            border: 1.8px solid #1f4bb0;
            color: white;
            font-size: 1.05rem;
            font-weight: 520;
            padding: 8px 22px;
            border-radius: 20px;                /* 调小 */
            box-shadow: 0 4px 10px rgba(0, 110, 220, 0.06);
            cursor: pointer;
            transition: transform 0.1s ease;
            letter-spacing: 0.2px;
            line-height: 1.2;
            will-change: transform;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .section-btn:active {
            background: #2740a0;
            transform: scale(0.96);
            border-color: #1a3170;
        }

        /* 固定面额卡片网格 */
        .fixed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;                          /* 略减 */
        }

        /* 基础卡片样式 */
        .denom-card {
            border-radius: 12px;                 /* 36px → 12px */
            padding: 12px 18px 10px;              /* 上下内边距减小 → 高度缩小 */
            border: 1.5px solid;                  /* 边框颜色由各面值单独控制 */
            box-shadow: 0 5px 12px rgba(0, 85, 170, 0.04);
            background-repeat: repeat;            /* 纹理重复 */
        }

        /* 人民币专属配色 + 地纹纹理 (每个面值不同底色/边框) */
        .fixed-card[data-index="0"] { /* 100元 浅红 */
            border-color: #b52b2b;
            background-color: #ffe5e5;
            background-image: repeating-linear-gradient(45deg, rgba(180,40,40,0.03) 0px, rgba(180,40,40,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="1"] { /* 50元 浅绿 */
            border-color: #2e7d32;
            background-color: #e0f0e0;
            background-image: repeating-linear-gradient(45deg, rgba(30,100,30,0.03) 0px, rgba(30,100,30,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="2"] { /* 20元 浅黄 */
            border-color: #b78f1e;
            background-color: #fff7d4;
            background-image: repeating-linear-gradient(45deg, rgba(180,130,20,0.03) 0px, rgba(180,130,20,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="3"] { /* 10元 浅蓝 */
            border-color: #1b6bb0;
            background-color: #d9ebff;
            background-image: repeating-linear-gradient(45deg, rgba(20,80,160,0.03) 0px, rgba(20,80,160,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="4"] { /* 5元 浅紫 */
            border-color: #6a4c9c;
            background-color: #f0e2fc;
            background-image: repeating-linear-gradient(45deg, rgba(100,60,150,0.03) 0px, rgba(100,60,150,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="5"] { /* 1元 浅橄榄绿 */
            border-color: #6b8e23;
            background-color: #f0f0c0;
            background-image: repeating-linear-gradient(45deg, rgba(80,100,30,0.03) 0px, rgba(80,100,30,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="6"] { /* 5角 浅金黄 */
            border-color: #cc8b1f;
            background-color: #fcf0c0;
            background-image: repeating-linear-gradient(45deg, rgba(180,120,20,0.03) 0px, rgba(180,120,20,0.03) 2px, transparent 2px, transparent 8px);
        }
        .fixed-card[data-index="7"] { /* 1角 浅棕 */
            border-color: #8b5a2b;
            background-color: #f0ddd6;
            background-image: repeating-linear-gradient(45deg, rgba(100,60,20,0.04) 0px, rgba(100,60,20,0.04) 2px, transparent 2px, transparent 8px);
        }

        .card-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;                 /* 从16px减小 → 高度缩小 */
            flex-wrap: wrap;
        }

        .denom-name {
            font-weight: 620;
            font-size: 1.35rem;
            color: #0b5f9e;
            min-width: 65px;
            letter-spacing: -0.2px;
        }

        .btn {
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 350;
            height: 44px;
            width: 44px;
            border-radius: 50%;                  /* 圆形保持 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0, 100, 210, 0.2);
            cursor: pointer;
            transition: transform 0.1s ease;
            border: 2px solid rgba(255,255,255,0.4);
            flex-shrink: 0;
            will-change: transform;
        }

        .btn:active {
            transform: scale(0.92);
            box-shadow: 0 3px 6px rgba(0,80,180,0.3);
        }

        .btn-dec {
            background: white;
            color: #273FAB;
            border: 2px solid #cde2ff;
            box-shadow: 0 4px 10px rgba(0, 70, 150, 0.1);
        }
        .btn-inc {
            background: #273FAB;
            color: white;
        }

        .num-input {
            flex: 1;
            min-width: 60px;
            height: 44px;
            background: white;
            border: 2px solid #cde2ff;
            border-radius: 12px;                  /* 30px → 12px */
            text-align: center;
            font-size: 1.25rem;
            font-weight: 500;
            color: #02457a;
            outline: none;
            padding: 0 4px;
            -moz-appearance: textfield;
        }

        .num-input:focus {
            border-color: #2b8cff;
            box-shadow: 0 0 0 3px rgba(43, 140, 255, 0.2);
        }

        .card-subtotal {
            font-size: 1.2rem;
            font-weight: 600;
            color: #135b93;
            text-align: right;
            padding: 0 8px 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top: 1px dashed #b9d9ff;
            margin-top: 4px;                      /* 略减 */
        }

        /* 分割线（小屏幕显示） */
        .divider {
            margin: 24px 0 28px;
            border-top: 3px dotted #a2c9ff;
            display: none;
        }

        .other-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .other-card {
            background: #f3f9ff;
            border-radius: 12px;                  /* 40px → 12px */
            padding: 16px 18px;
            border: 1.5px solid #b9d6fc;
            box-shadow: 0 5px 12px rgba(0, 70, 150, 0.04);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            cursor: context-menu;
        }

        .other-card.context-menu-active {
            background: #e8f0fe;
            border-color: #1a7ae0;
            box-shadow: 0 0 0 2px rgba(26,122,224,0.3);
        }

        .other-name-input {
            height: 44px;
            background: white;
            border: 2px solid #cde2ff;
            border-radius: 12px;                   /* 30px → 12px */
            padding: 0 12px;
            font-size: 1rem;
            color: #02457a;
            outline: none;
            width: 90px;
            min-width: 70px;
            flex: 0 0 auto;
        }

        .other-name-input:focus {
            border-color: #1a7ae0;
        }

        .other-amount-input {
            height: 44px;
            background: white;
            border: 2px solid #cde2ff;
            border-radius: 12px;                   /* 30px → 12px */
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            color: #02457a;
            outline: none;
            padding: 0 6px;
            width: 110px;
            flex: 1 1 auto;
        }

        .other-amount-input:focus {
            border-color: #1a7ae0;
        }

        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 32px;
            height: 32px;
            border-radius: 50%;                    /* 保持圆形 */
            background: #ff4d6d;
            color: white;
            border: 2px solid white;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.4);
            transition: transform 0.1s ease;
            z-index: 10;
            will-change: transform;
        }

        .delete-btn:active {
            transform: scale(0.9);
            background: #e63e5c;
        }

        .right-click-hint {
            font-size: 0.8rem;
            color: #6688aa;
            margin-top: 12px;
            text-align: right;
            opacity: 0.7;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,45,75,0.3);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: white;
            max-width: 450px;
            width: 90%;
            border-radius: 16px;                   /* 56px → 16px */
            padding: 32px 28px;
            box-shadow: 0 30px 50px rgba(0,50,110,0.3);
            border: 2px solid #aacdff;
            text-align: center;
        }

        .modal-card h3 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #065a8f;
            margin-bottom: 20px;
        }

        .modal-message {
            font-size: 1.1rem;
            color: #02457a;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-direction: row;
        }

        .modal-btn {
            border: none;
            font-size: 1.2rem;
            font-weight: 520;
            padding: 14px 32px;
            border-radius: 30px;                    /* 保持微圆 */
            cursor: pointer;
            transition: transform 0.1s ease;
            min-width: 120px;
            will-change: transform;
        }

        .modal-btn:active {
            transform: scale(0.96);
        }

        .modal-btn.confirm {
            background: #e6f0ff;
            color: #1f6eb0;
            border: 2px solid #3399ff;
        }

        .modal-btn.cancel {
            background: #355FE1;
            color: white;
            border: 2px solid #2740a0;
        }

        /* 移动端操作菜单专用样式 */
        #mobileActionModal .modal-card {
            max-width: 320px;
        }
        #mobileActionModal .action-btn {
            width: 100%;
            margin: 0;
            font-size: 1.2rem;
            padding: 14px 20px;
            border-width: 2px;
        }

        .history-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,45,75,0.3);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .history-list {
            max-height: 380px;
            overflow-y: auto;
            background: #f2f9ff;
            border-radius: 16px;                    /* 40→16 */
            padding: 16px;
            margin-bottom: 24px;
        }

        .history-item {
            padding: 14px 18px;
            border-bottom: 1px solid #bad2f5;
            font-size: 1.2rem;
            color: #02457a;
            display: flex;
            justify-content: space-between;
        }

        .history-time {
            color: #5f8bb3;
        }

        /* 小票导出容器 (隐藏) */
        #ticketContainer {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 400px;
            background: white;
            color: black;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            padding: 24px 20px;
            box-sizing: border-box;
            line-height: 1.6;
            border: none;
            z-index: -1;
        }

        #ticketContainer .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        #ticketContainer .sub-title {
            font-weight: bold;
            margin-top: 16px;
            margin-bottom: 6px;
            border-bottom: 1px dashed #aaa;
            display: flex;
            justify-content: space-between;
        }

        #ticketContainer .total-row {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0 10px;
        }

        #ticketContainer .date-row {
            text-align: center;
            color: #333;
            margin-top: 12px;
            font-size: 14px;
        }

        #ticketContainer .item-row {
            display: flex;
            justify-content: space-between;
            margin: 4px 0;
        }

        /* ---------- 移动端优化 (窄屏) ---------- */
        @media (max-width: 600px) {
            .action-group {
                display: none;
            }
            .hamburger-container {
                display: block;
            }
            h1 {
                font-size: 1.6rem;
                padding-left: 8px;
                border-left-width: 4px;
            }
            .hamburger-btn {
                font-size: 2rem;
                height: 48px;
                padding: 0 14px;
            }
        }

        @media (max-width: 500px) {
            .fixed-header h2, .other-header h2 {
                font-size: 1.3rem;
            }
            .region-total {
                font-size: 1.1rem;
                padding: 2px 12px;
            }
            .section-btn {
                font-size: 0.9rem;
                padding: 6px 16px;
            }
            .header-left {
                gap: 5px;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.3rem;
            }
            .hamburger-btn {
                font-size: 1.8rem;
                height: 44px;
                padding: 0 10px;
            }
            .fixed-header h2, .other-header h2 {
                font-size: 1.1rem;
            }
            .region-total {
                font-size: 1rem;
                padding: 2px 8px;
            }
            .section-btn {
                font-size: 0.8rem;
                padding: 5px 12px;
            }
        }

        @media (min-width: 601px) {
            .hamburger-container {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .divider {
                display: block;
            }
            .main-content {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <!-- 头部 包含汉堡菜单 -->
        <div class="header-row">
            <h1>数钱计算器</h1>
            <!-- 原始按钮组 -->
            <div class="action-group">
                <button class="action-btn" id="resetAllBtn">初始化</button>
                <button class="action-btn" id="historyBtn">历史记录</button>
                <button class="action-btn" id="exportBtn">导出图片</button>
            </div>
            <!-- 汉堡菜单容器 (移动端显示) -->
            <div class="hamburger-container" id="hamburgerContainer">
                <button class="hamburger-btn" id="hamburgerToggle">☰</button>
            </div>
        </div>

        <!-- 总金额区域 - 可点击复制 -->
        <div class="total-banner-wrapper" id="totalWrapper">
            <div class="total-banner" id="totalBanner">
                <div class="total-label">总金额</div>
                <div class="total-amount" id="totalAmount">
                    <span class="currency-symbol">¥</span>
                    <span id="totalDisplay">0.00</span>
                </div>
            </div>
        </div>

        <!-- 双栏内容区 -->
        <div class="main-content">
            <!-- 左侧固定面值区域 (已添加边框) -->
            <div class="fixed-section">
                <div class="fixed-header">
                    <div class="header-left">
                        <h2>固定面值：</h2>
                        <span class="region-total" id="fixedRegionTotal">¥0.00</span>
                    </div>
                    <button class="section-btn" id="resetFixedBtn">归零</button>
                </div>
                <div class="fixed-grid" id="fixedGrid"></div>
            </div>

            <!-- 右侧其他项目区域 (原“其他数值”改名) -->
            <div class="other-section">
                <div class="other-header">
                    <div class="header-left">
                        <h2>其他项目：</h2>                  <!-- 标题修改 -->
                        <span class="region-total" id="otherRegionTotal">¥0.00</span>
                    </div>
                    <button class="section-btn" id="addOtherBtn">添加</button>
                </div>
                <div class="other-grid" id="otherGrid"></div>
                <div class="right-click-hint">✨ 右键或长按卡片可删除</div>
            </div>
        </div>

        <!-- 初始化确认弹窗 -->
        <div id="confirmModal" class="modal">
            <div class="modal-card">
                <h3>初始化数据警告</h3>
                <div class="modal-message">
                    本计算器采用的是本地缓存加离线运行方式，<br>
                    一旦执行初始化将完全清除本地缓存的所有数据，<br>
                    并且无法恢复，您是否要继续？
                </div>
                <div class="modal-actions">
                    <button class="modal-btn confirm" id="confirmInitBtn">要</button>
                    <button class="modal-btn cancel" id="cancelInitBtn">不要</button>
                </div>
            </div>
        </div>

        <!-- 历史记录弹窗 -->
        <div id="historyModal" class="history-modal">
            <div class="modal-card">
                <h3>历史记录</h3>
                <div id="historyList" class="history-list"></div>
                <button class="section-btn" id="closeModalBtn" style="width:100%;">关闭</button>
            </div>
        </div>

        <!-- 移动端操作菜单弹窗 -->
        <div id="mobileActionModal" class="modal">
            <div class="modal-card">
                <h3 style="font-size:1.5rem;">操作菜单</h3>
                <div style="display: flex; flex-direction: column; gap: 12px; margin: 20px 0;">
                    <button class="action-btn" id="mobileResetBtn" style="width:100%; border-color:#ff3b3b; background:#fff4f4; color:#b91c1c;">初始化</button>
                    <button class="action-btn" id="mobileHistoryBtn" style="width:100%;">历史记录</button>
                    <button class="action-btn" id="mobileExportBtn" style="width:100%;">导出图片</button>
                </div>
                <div class="modal-actions" style="justify-content:center;">
                    <button class="modal-btn cancel" id="closeMobileModal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的小票容器 -->
    <div id="ticketContainer"></div>

    <script>
        (function() {
            // ---------- 固定面额 ----------
            const fixedDenoms = [
                { label: '100元', value: 10000 },
                { label: '50元', value: 5000 },
                { label: '20元', value: 2000 },
                { label: '10元', value: 1000 },
                { label: '5元', value: 500 },
                { label: '1元', value: 100 },
                { label: '5角', value: 50 },
                { label: '1角', value: 10 }
            ];
            let fixedCounts = new Array(fixedDenoms.length).fill(0);

            // ---------- 其他项目 ----------
            let otherItems = [];
            let nextOtherId = 1000;

            // 历史快照
            let historySnapshots = [];

            const STORAGE_KEY = 'moneyCalc_final_copy';

            let activeContextCardId = null;

            // 计算总金额(元)
            function calcTotalYuan() {
                let totalFen = 0;
                for (let i = 0; i < fixedDenoms.length; i++) {
                    totalFen += fixedCounts[i] * fixedDenoms[i].value;
                }
                for (let item of otherItems) {
                    totalFen += item.amount;
                }
                return (totalFen / 100).toFixed(2);
            }

            function calcFixedRegionYuan() {
                let totalFen = 0;
                for (let i = 0; i < fixedDenoms.length; i++) {
                    totalFen += fixedCounts[i] * fixedDenoms[i].value;
                }
                return (totalFen / 100).toFixed(2);
            }

            function calcOtherRegionYuan() {
                let totalFen = 0;
                for (let item of otherItems) {
                    totalFen += item.amount;
                }
                return (totalFen / 100).toFixed(2);
            }

            function updateRegionTotals() {
                document.getElementById('fixedRegionTotal').textContent = '¥' + calcFixedRegionYuan();
                document.getElementById('otherRegionTotal').textContent = '¥' + calcOtherRegionYuan();
            }

            // 根据数字长度调整总金额字号
            function adjustTotalFontSize() {
                const totalSpan = document.getElementById('totalDisplay');
                const totalAmountDiv = document.getElementById('totalAmount');
                if (!totalSpan || !totalAmountDiv) return;
                const text = totalSpan.textContent;
                const len = text.length;
                let fontSize;
                if (len <= 8) fontSize = '2.8rem';
                else if (len <= 10) fontSize = '2.4rem';
                else if (len <= 12) fontSize = '2.0rem';
                else if (len <= 14) fontSize = '1.6rem';
                else fontSize = '1.3rem';
                totalAmountDiv.style.fontSize = fontSize;
            }

            function refreshTotalOnly() {
                document.getElementById('totalDisplay').textContent = calcTotalYuan();
                adjustTotalFontSize();
            }

            // 缓存读写
            function saveToCache() {
                try {
                    const data = { fixedCounts, otherItems, nextId: nextOtherId };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch (e) {}
            }

            function loadFromCache() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return;
                    const data = JSON.parse(raw);
                    if (data.fixedCounts?.length === fixedDenoms.length) {
                        fixedCounts = data.fixedCounts.map(v => Math.max(0, Number(v) || 0));
                    }
                    if (Array.isArray(data.otherItems)) {
                        otherItems = data.otherItems.map(item => ({
                            id: item.id || nextOtherId++,
                            name: item.name || item.label || '其他项',    // 旧数据统一转为“其他项”
                            amount: Math.max(0, Math.round(Number(item.amount) || 0))
                        }));
                    }
                    if (data.nextId && data.nextId > nextOtherId) nextOtherId = data.nextId;
                } catch (e) {}
            }

            function resetAllData() {
                localStorage.removeItem(STORAGE_KEY);
                fixedCounts = new Array(fixedDenoms.length).fill(0);
                otherItems = [];
                nextOtherId = 1000;
                historySnapshots = [];
                refreshAllUI();
            }

            // 渲染固定网格
            function renderFixedGrid() {
                const grid = document.getElementById('fixedGrid');
                let html = '';
                for (let i = 0; i < fixedDenoms.length; i++) {
                    const d = fixedDenoms[i];
                    const cnt = fixedCounts[i];
                    const subtotal = ((cnt * d.value) / 100).toFixed(2);
                    html += `
                        <div class="denom-card fixed-card" data-index="${i}">
                            <div class="card-row">
                                <span class="denom-name">${d.label}</span>
                                <button class="btn btn-dec">−</button>
                                <input type="text" class="num-input" inputmode="numeric" value="${cnt}" max="99999" placeholder="0">
                                <button class="btn btn-inc">+</button>
                            </div>
                            <div class="card-subtotal">${subtotal} 元</div>
                        </div>
                    `;
                }
                grid.innerHTML = html;
            }

            function renderOtherGrid() {
                const grid = document.getElementById('otherGrid');
                let html = '';
                for (let item of otherItems) {
                    const displayAmount = (item.amount / 100).toFixed(2);
                    html += `
                        <div class="other-card" data-other-id="${item.id}">
                            <input type="text" class="other-name-input" value="${item.name}" placeholder="名称">
                            <input type="text" class="other-amount-input" value="${displayAmount}" placeholder="0.00" inputmode="decimal">
                        </div>
                    `;
                }
                grid.innerHTML = html;
            }

            function refreshAllUI() {
                renderFixedGrid();
                renderOtherGrid();
                refreshTotalOnly();
                updateRegionTotals();
                saveToCache();
            }

            // 显示删除按钮
            function showDeleteButton(card, id) {
                hideDeleteButton();
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '✕';
                deleteBtn.setAttribute('data-delete-id', id);
                card.appendChild(deleteBtn);
                card.classList.add('context-menu-active');
                activeContextCardId = id;
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    otherItems = otherItems.filter(item => item.id !== id);
                    refreshAllUI();
                    hideDeleteButton();
                });
            }

            function hideDeleteButton() {
                const existingBtn = document.querySelector('.delete-btn');
                if (existingBtn) {
                    const parent = existingBtn.parentElement;
                    if (parent) parent.classList.remove('context-menu-active');
                    existingBtn.remove();
                }
                activeContextCardId = null;
            }

            // 复制总金额
            function setupCopyTotal() {
                const totalBanner = document.getElementById('totalBanner');
                const totalDisplay = document.getElementById('totalDisplay');
                totalBanner.addEventListener('click', async () => {
                    const amount = totalDisplay.textContent;
                    const textToCopy = `¥${amount}`;
                    try {
                        await navigator.clipboard.writeText(textToCopy);
                        showCopyToast(`已复制 ${textToCopy}`);
                    } catch (err) {
                        const textarea = document.createElement('textarea');
                        textarea.value = textToCopy;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        showCopyToast(`已复制 ${textToCopy}`);
                    }
                });
            }

            function showCopyToast(message) {
                const existing = document.querySelector('.copy-toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            }

            // 固定网格事件
            function setupFixedEvents() {
                const fixedGrid = document.getElementById('fixedGrid');
                fixedGrid.addEventListener('click', (e) => {
                    const target = e.target;
                    if (!target.classList.contains('btn')) return;
                    const card = target.closest('.fixed-card');
                    if (!card) return;
                    const idx = parseInt(card.dataset.index, 10);
                    const input = card.querySelector('.num-input');
                    let val = parseInt(input.value) || 0;
                    if (target.classList.contains('btn-dec')) val = Math.max(0, val - 1);
                    else if (target.classList.contains('btn-inc')) val = Math.min(99999, val + 1);
                    input.value = val;
                    updateFixedCard(card, idx);
                });
                fixedGrid.addEventListener('input', (e) => {
                    const target = e.target;
                    if (!target.classList.contains('num-input')) return;
                    const card = target.closest('.fixed-card');
                    if (!card) return;
                    const idx = parseInt(card.dataset.index, 10);
                    updateFixedCard(card, idx);
                });
                fixedGrid.addEventListener('change', (e) => {
                    const target = e.target;
                    if (!target.classList.contains('num-input')) return;
                    const card = target.closest('.fixed-card');
                    if (!card) return;
                    const idx = parseInt(card.dataset.index, 10);
                    updateFixedCard(card, idx);
                });
            }

            function updateFixedCard(card, idx) {
                const input = card.querySelector('.num-input');
                let raw = input.value.replace(/\D/g, '');
                let intVal = raw === '' ? 0 : Math.min(99999, parseInt(raw, 10));
                input.value = intVal;
                fixedCounts[idx] = intVal;
                const subtotalSpan = card.querySelector('.card-subtotal');
                const totalFen = intVal * fixedDenoms[idx].value;
                subtotalSpan.textContent = (totalFen / 100).toFixed(2) + ' 元';
                refreshTotalOnly();
                updateRegionTotals();
                saveToCache();
            }

            // 其他网格事件
            function setupOtherEvents() {
                const otherGrid = document.getElementById('otherGrid');
                otherGrid.addEventListener('input', (e) => {
                    const target = e.target;
                    if (!target.classList.contains('other-name-input')) return;
                    const card = target.closest('.other-card');
                    if (!card) return;
                    const id = parseInt(card.dataset.otherId, 10);
                    const item = otherItems.find(it => it.id === id);
                    if (!item) return;
                    // 默认空白时改为“其他项”
                    item.name = target.value.trim() || '其他项';
                    saveToCache();
                });

                otherGrid.addEventListener('blur', (e) => {
                    const target = e.target;
                    if (!target.classList.contains('other-amount-input')) return;
                    const card = target.closest('.other-card');
                    if (!card) return;
                    const id = parseInt(card.dataset.otherId, 10);
                    const item = otherItems.find(it => it.id === id);
                    if (!item) return;
                    let rawValue = target.value.trim();
                    if (rawValue === '') rawValue = '0';
                    let cleaned = rawValue.replace(/[^\d.-]/g, '');
                    const parts = cleaned.split('.');
                    if (parts.length > 2) cleaned = parts[0] + '.' + parts.slice(1).join('');
                    let yuan = parseFloat(cleaned);
                    if (isNaN(yuan) || yuan < 0) yuan = 0;
                    item.amount = Math.round(yuan * 100);
                    target.value = (item.amount / 100).toFixed(2);
                    refreshTotalOnly();
                    updateRegionTotals();
                    saveToCache();
                }, true);

                otherGrid.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const card = e.target.closest('.other-card');
                    if (!card) return;
                    const id = parseInt(card.dataset.otherId, 10);
                    if (!id) return;
                    showDeleteButton(card, id);
                });

                let pressTimer = null;
                otherGrid.addEventListener('touchstart', (e) => {
                    const card = e.target.closest('.other-card');
                    if (!card) return;
                    pressTimer = setTimeout(() => {
                        const id = parseInt(card.dataset.otherId, 10);
                        if (!id) return;
                        if (navigator.vibrate) navigator.vibrate(50);
                        showDeleteButton(card, id);
                    }, 500);
                });
                otherGrid.addEventListener('touchend', () => clearTimeout(pressTimer));
                otherGrid.addEventListener('touchcancel', () => clearTimeout(pressTimer));
                otherGrid.addEventListener('touchmove', () => clearTimeout(pressTimer));

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.delete-btn') && !e.target.closest('.other-card')) {
                        hideDeleteButton();
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') hideDeleteButton();
                });
            }

            // ---------- 导出图片功能 ----------
            function formatDate() {
                const d = new Date();
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2,'0');
                const day = String(d.getDate()).padStart(2,'0');
                const hour = String(d.getHours()).padStart(2,'0');
                const min = String(d.getMinutes()).padStart(2,'0');
                const sec = String(d.getSeconds()).padStart(2,'0');
                return `${year}-${month}-${day} ${hour}:${min}:${sec}`;
            }

            function buildTicketHTML() {
                const totalYuan = calcTotalYuan();
                const fixedTotal = calcFixedRegionYuan();
                const otherTotal = calcOtherRegionYuan();
                const dateStr = formatDate();

                let fixedLines = '';
                for (let i = 0; i < fixedDenoms.length; i++) {
                    const count = fixedCounts[i];
                    if (count === 0) continue;
                    const denom = fixedDenoms[i];
                    const subtotal = (count * denom.value / 100).toFixed(2);
                    fixedLines += `<div class="item-row"><span>${denom.label} 共 ${count} 张</span><span>小计：${subtotal}元</span></div>`;
                }
                if (fixedLines === '') fixedLines = '<div class="item-row">(无)</div>';

                let otherLines = '';
                for (let item of otherItems) {
                    if (item.amount === 0) continue;
                    const amountYuan = (item.amount / 100).toFixed(2);
                    otherLines += `<div class="item-row"><span>${item.name || '其他项'}</span><span>${amountYuan}元</span></div>`;
                }
                if (otherLines === '') otherLines = '<div class="item-row">(无)</div>';

                return `
                    <div class="title">SPAN数钱计算器</div>
                    <div class="sub-title">固定面值： ¥${fixedTotal}</div>
                    ${fixedLines}
                    <div class="sub-title">其他项目： ¥${otherTotal}</div>   <!-- 标题同步 -->
                    ${otherLines}
                    <div class="total-row">总金额：${totalYuan}元</div>
                    <div class="date-row">时间：${dateStr}</div>
                `;
            }

            // 弹窗函数
            function showResetModal() {
                document.getElementById('confirmModal').style.display = 'flex';
            }

            function showHistoryModal() {
                const total = calcTotalYuan();
                historySnapshots.unshift({ time: new Date().toLocaleTimeString(), total });
                if (historySnapshots.length > 10) historySnapshots.pop();
                const listDiv = document.getElementById('historyList');
                listDiv.innerHTML = historySnapshots.map(s => 
                    `<div class="history-item"><span>💰 ${s.total} 元</span><span class="history-time">${s.time}</span></div>`
                ).join('') || '<div class="history-item">暂无记录</div>';
                document.getElementById('historyModal').style.display = 'flex';
            }

            function exportImage() {
                const ticketDiv = document.getElementById('ticketContainer');
                ticketDiv.innerHTML = buildTicketHTML();
                html2canvas(ticketDiv, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    allowTaint: false,
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `数钱小票_${formatDate().replace(/:/g,'-')}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    alert('图片导出失败，可稍后重试。\n' + err);
                });
            }

            function closeMobileModal() {
                document.getElementById('mobileActionModal').style.display = 'none';
            }

            // 汉堡菜单
            function setupHamburgerMenu() {
                const hamburgerBtn = document.getElementById('hamburgerToggle');
                const mobileModal = document.getElementById('mobileActionModal');

                if (!hamburgerBtn || !mobileModal) return;

                hamburgerBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    mobileModal.style.display = 'flex';
                });

                document.getElementById('mobileResetBtn').addEventListener('click', () => {
                    showResetModal();
                    closeMobileModal();
                });
                document.getElementById('mobileHistoryBtn').addEventListener('click', () => {
                    showHistoryModal();
                    closeMobileModal();
                });
                document.getElementById('mobileExportBtn').addEventListener('click', () => {
                    exportImage();
                    closeMobileModal();
                });
                document.getElementById('closeMobileModal').addEventListener('click', closeMobileModal);

                window.addEventListener('click', (e) => {
                    if (e.target === mobileModal) closeMobileModal();
                });
            }

            // 重新绑定原始按钮
            function rebindOriginalButtons() {
                document.getElementById('resetAllBtn').addEventListener('click', showResetModal);
                document.getElementById('historyBtn').addEventListener('click', showHistoryModal);
                document.getElementById('exportBtn').addEventListener('click', exportImage);
            }

            // 全局按钮事件
            function setupGlobalEvents() {
                document.getElementById('resetFixedBtn').addEventListener('click', () => {
                    fixedCounts.fill(0);
                    refreshAllUI();
                });

                document.getElementById('addOtherBtn').addEventListener('click', () => {
                    // 默认名称改为“其他项”
                    otherItems.push({ id: nextOtherId++, name: '其他项', amount: 0 });
                    refreshAllUI();
                });

                const confirmModal = document.getElementById('confirmModal');
                document.getElementById('cancelInitBtn').addEventListener('click', () => { confirmModal.style.display = 'none'; });
                document.getElementById('confirmInitBtn').addEventListener('click', () => {
                    resetAllData();
                    confirmModal.style.display = 'none';
                });
                window.addEventListener('click', (e) => { if (e.target === confirmModal) confirmModal.style.display = 'none'; });

                const historyModal = document.getElementById('historyModal');
                document.getElementById('closeModalBtn').addEventListener('click', () => { historyModal.style.display = 'none'; });
                window.addEventListener('click', (e) => { if (e.target === historyModal) historyModal.style.display = 'none'; });
            }

            function init() {
                loadFromCache();
                renderFixedGrid();
                renderOtherGrid();
                refreshTotalOnly();
                updateRegionTotals();
                setupFixedEvents();
                setupOtherEvents();
                setupCopyTotal();

                rebindOriginalButtons();
                setupGlobalEvents();
                setupHamburgerMenu();
            }

            init();
        })();
    </script>
</body>
</html>
